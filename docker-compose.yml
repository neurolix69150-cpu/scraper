version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - PORT=3001
    volumes:
      - scraper_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  scraper_data:
